<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task 3</title>

    <style>
        .palette {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .color {
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: 2px solid black;
        }

        .selected {
            border: 4px solid red;
        }

        #box {
            width: 300px;
            height: 150px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

<h2>Лабораторна робота №5</h2>
<h3>Завдання 3</h3>

<div class="palette">
    <div class="color" data-color="red" style="background:red;"></div>
    <div class="color" data-color="blue" style="background:blue;"></div>
    <div class="color" data-color="green" style="background:green;"></div>
    <div class="color" data-color="yellow" style="background:yellow;"></div>
    <div class="color" data-color="purple" style="background:purple;"></div>
</div>

<div id="box"></div>

<script src="task3.js"></script>

</body>
</html>
