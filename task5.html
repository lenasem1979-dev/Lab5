<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 5</title>

  <style>
    .palette {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .color {
      width: 40px;
      height: 40px;
      border: 2px solid black;
      cursor: pointer;
    }

    .selected {
      border: 4px solid red;
    }

    #canvas {
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px);
      gap: 1px;
    }

    .cell {
      width: 20px;
      height: 20px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>
<body>

<h2>Лабораторна робота 5</h2>
<h3>Завдання 5</h3>

<div class="palette">
  <div class="color" data-color="red" style="background:red;"></div>
  <div class="color" data-color="blue" style="background:blue;"></div>
  <div class="color" data-color="green" style="background:green;"></div>
  <div class="color" data-color="yellow" style="background:yellow;"></div>
  <div class="color" data-color="black" style="background:black;"></div>
</div>

<div id="canvas"></div>

<script src="task5.js"></script>

</body>
</html>
