<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task 6</title>

    <style>
        .board {
            display: flex;
            gap: 15px;
        }

        .card {
            width: 100px;
            height: 140px;
            perspective: 1000px;
            cursor: pointer;
        }

        .inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 1.2s;
            transform-style: preserve-3d;
        }

        .card.flipped .inner {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .back {
            background: green;
            color: white;
        }

        .front {
            background: white;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

<h2>Лабораторна робота 5</h2>
<h3>Завдання 6</h3>

<div class="board">

    <div class="card">
        <div class="inner">
            <div class="face front">🂡</div>
            <div class="face back">?</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="face front">🂢</div>
            <div class="face back">?</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="face front">🂣</div>
            <div class="face back">?</div>
        </div>
    </div>

</div>

<script src="task6.js"></script>

</body>
</html>
